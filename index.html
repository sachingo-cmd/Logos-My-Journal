<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logos | Disciplined Journaling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-bar { transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-focus:focus { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); outline: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <header class="w-full max-w-2xl flex justify-between items-center mb-8">
        <h1 class="text-xl font-bold tracking-tighter text-blue-500 uppercase">Logos</h1>
        <div class="flex gap-3">
            <div class="glass px-4 py-2 rounded-full flex items-center gap-2 text-xs font-bold">
                <i data-lucide="flame" class="text-orange-500 w-4 h-4"></i> <span id="streak-disp">0</span>
            </div>
            <div class="glass px-4 py-2 rounded-full flex items-center gap-2 text-xs font-bold">
                <i data-lucide="coins" class="text-yellow-500 w-4 h-4"></i> <span id="coin-disp">0</span>
            </div>
        </div>
    </header>

    <section class="w-full max-w-2xl mb-10 px-2">
        <div class="flex justify-between items-end mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">
            <span id="habit-status">Initiating</span>
            <span>Day <span id="days-disp">0</span> / 90</span>
        </div>
        <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-blue-600 progress-bar shadow-[0_0_15px_rgba(59,130,246,0.3)]" style="width: 0%"></div>
        </div>
    </section>

    <main class="w-full max-w-2xl">
        <div id="setup-ui" class="glass p-6 rounded-2xl hidden mb-6 border-blue-500/30">
            <h2 class="text-blue-400 font-bold text-sm uppercase tracking-widest mb-4">Vault Connection</h2>
            <input type="text" id="gas-url" placeholder="Paste Web App URL here..." class="w-full bg-black/40 border border-white/10 rounded-lg p-3 text-sm mb-4 outline-none focus:border-blue-500">
            <div class="flex gap-2">
                <button onclick="saveConfig()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold uppercase text-[10px]">Connect & Sync</button>
                <button onclick="testAdvanceDay()" class="px-4 bg-white/5 text-gray-400 rounded-xl text-[10px] font-bold uppercase">Test: +1 Day</button>
            </div>
        </div>

        <div id="form-ui" class="space-y-6 pb-20">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-600 uppercase">1. Win</label>
                    <textarea id="p1" placeholder="..." class="w-full glass rounded-xl p-3 min-h-[60px] resize-none input-focus text-sm"></textarea>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-600 uppercase">2. Friction</label>
                    <textarea id="p2" placeholder="..." class="w-full glass rounded-xl p-3 min-h-[60px] resize-none input-focus text-sm"></textarea>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-600 uppercase">3. Pivot</label>
                    <textarea id="p3" placeholder="..." class="w-full glass rounded-xl p-3 min-h-[60px] resize-none input-focus text-sm"></textarea>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-600 uppercase">4. Env</label>
                    <textarea id="p4" placeholder="..." class="w-full glass rounded-xl p-3 min-h-[60px] resize-none input-focus text-sm"></textarea>
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-600 uppercase tracking-widest">5. Brain Dump</label>
                <textarea id="p5" placeholder="..." class="w-full glass rounded-xl p-4 min-h-[180px] resize-none input-focus text-sm"></textarea>
            </div>
            <button id="submit-btn" disabled class="w-full py-4 rounded-xl bg-gray-800 text-gray-500 font-bold uppercase text-xs tracking-widest transition-all">Lock Entry</button>
        </div>

        <div id="success-ui" class="hidden glass p-12 rounded-3xl text-center space-y-4">
            <div class="w-16 h-16 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto"><i data-lucide="check" class="w-8 h-8"></i></div>
            <h2 class="text-xl font-bold uppercase tracking-tighter">Vault Updated</h2>
            <button onclick="location.reload()" class="bg-white text-black px-10 py-3 rounded-full font-bold text-xs uppercase shadow-xl">Finish</button>
        </div>
    </main>

    <footer class="mt-auto py-8">
        <button onclick="document.getElementById('setup-ui').classList.toggle('hidden')" class="text-[9px] text-gray-700 hover:text-blue-500 uppercase tracking-[0.3em] flex items-center gap-2"><i data-lucide="settings" class="w-3 h-3"></i> Settings & Sync</button>
    </footer>

    <script>
        let state = { 
            coins: parseInt(localStorage.getItem('logos_c')) || 0, 
            streak: parseInt(localStorage.getItem('logos_s')) || 0, 
            totalDays: parseInt(localStorage.getItem('logos_d')) || 0, 
            lastEntry: localStorage.getItem('logos_e') || null, 
            url: localStorage.getItem('logos_u') || '' 
        };

        async function init() {
            lucide.createIcons();
            if (!state.url) {
                document.getElementById('setup-ui').classList.remove('hidden');
            } else {
                try {
                    const res = await fetch(state.url);
                    const txt = await res.text();
                    if (txt && txt !== "none" && !txt.includes("<!")) {
                        const cloud = JSON.parse(txt);
                        state = { ...state, ...cloud };
                        saveLocal();
                    }
                } catch(e) { console.error("Sync failed", e); }
            }
            updateUI();
        }

        function saveLocal() {
            localStorage.setItem('logos_c', state.coins);
            localStorage.setItem('logos_s', state.streak);
            localStorage.setItem('logos_d', state.totalDays);
            localStorage.setItem('logos_e', state.lastEntry);
            localStorage.setItem('logos_u', state.url);
        }

        function updateUI() {
            document.getElementById('coin-disp').innerText = state.coins;
            document.getElementById('streak-disp').innerText = state.streak;
            document.getElementById('days-disp').innerText = state.totalDays;
            const p = Math.min((state.totalDays / 90) * 100, 100);
            document.getElementById('progress-bar').style.width = p + '%';
            if (state.totalDays >= 66) document.getElementById('habit-status').innerText = "Automaticity";
            else if (state.totalDays >= 30) document.getElementById('habit-status').innerText = "Momentum";
        }

        function saveConfig() {
            const val = document.getElementById('gas-url').value.trim();
            if (val.includes('script.google.com')) { localStorage.setItem('logos_u', val); location.reload(); }
        }

        function testAdvanceDay() {
            state.lastEntry = "2000-01-01T00:00:00.000Z";
            saveLocal();
            alert("Date reset for testing. Your next submission will count as a new day.");
            location.reload();
        }

        const tas = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3'), document.getElementById('p4'), document.getElementById('p5')];
        const btn = document.getElementById('submit-btn');
        
        const checkValid = () => {
            const allFilled = tas.every(t => t.value.trim().length > 0);
            btn.disabled = !allFilled;
            btn.className = allFilled ? "w-full py-4 rounded-xl bg-blue-600 text-white font-bold uppercase text-xs tracking-widest" : "w-full py-4 rounded-xl bg-gray-800 text-gray-500 font-bold uppercase text-xs tracking-widest";
        };
        tas.forEach(t => t.addEventListener('input', checkValid));

        btn.addEventListener('click', async () => {
            btn.innerText = "TRANSMITTING..."; btn.disabled = true;
            const entry = { timestamp: new Date().toLocaleString(), win: tas[0].value, friction: tas[1].value, pivot: tas[2].value, environment: tas[3].value, dump: tas[4].value };
            
            try {
                await fetch(state.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
                
                const now = new Date();
                const last = state.lastEntry ? new Date(state.lastEntry) : null;
                
                if (!last || now.toDateString() !== last.toDateString()) {
                    state.totalDays++;
                    state.streak = (last && Math.floor((now-last)/864e5) === 1) ? state.streak + 1 : 1;
                    state.coins += 10;
                    state.lastEntry = now.toISOString();
                    saveLocal();
                    await fetch(state.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "sync_save", stats: state }) });
                }

                document.getElementById('form-ui').classList.add('hidden');
                document.getElementById('success-ui').classList.remove('hidden');
            } catch(e) { 
                alert("Connection failed. Check your Web App URL."); 
                btn.innerText = "RETRY"; btn.disabled = false; 
            }
        });

        init();
    </script>
</body>
</html>
